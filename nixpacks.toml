[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "chromium-driver",
  "glib",
  "nss",
  "nspr",
  "dbus",
  "atk",
  "cups",
  "gtk3",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps",
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
